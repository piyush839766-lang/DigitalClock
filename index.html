<!DOCTYPE html>
<html>
<head>
    <title>Digital Clock</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; padding: 50px; }
        .clock { font-size: 3em; margin: 20px; padding: 20px; border: 2px solid #0f0; }
        .timezone { font-size: 1.2em; margin: 10px; }
    </style>
</head>
<body>
    <h1>⏰ World Clock</h1>
    <div id="clocks"></div>
    <script>
        function update() {
            const zones = ['Nepal', 'India', 'UK', 'USA-East', 'USA-West', 'Japan', 'Australia'];
            const offsets = [5.75, 5.5, 0, -5, -8, 9, 10];
            let html = '';
            offsets.forEach((off, i) => {
                const d = new Date(new Date().getTime() + off * 3600000);
                html += `<div class="timezone"><b>${zones[i]}</b><br><div class="clock">${d.toLocaleTimeString()}</div></div>`;
            });
            document.getElementById('clocks').innerHTML = html;
        }
        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
